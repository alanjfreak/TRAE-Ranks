<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时代台球王-排行榜</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- 自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        billiard: {
                            green: '#166534',      // 主绿色（深绿，适配深色）
                            light: '#22c55e',     // 亮绿（强调色）
                            accent: '#F5D76E',    // 金色（装饰）
                            dark: '#0f172a',      // 深灰黑（页面背景）
                            darker: '#030712',    // 超深色（卡片背景）
                            gold: '#FFD700',      // 第一名金色
                            silver: '#C0C0C0',    // 第二名银色
                            bronze: '#CD7F32',    // 第三名铜色
                            gray: '#1e293b',      // 浅灰背景（深色模式）
                            text: '#f8fafc',      // 主文字色
                            textLight: '#94a3b8', // 次要文字色
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 4px 20px -2px rgba(0, 0, 0, 0.2)',
                        'card-hover': '0 8px 30px -4px rgba(0, 0, 0, 0.3)',
                        'modal': '0 10px 50px -10px rgba(0, 0, 0, 0.5)',
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .rank-up { color: #306339; }  /* 上升绿色 */
            .rank-down { color: #EF4444; } /* 下降红色 */
            .rank-same { color: #94A3B8; } /* 不变灰色 */
            .card-hover { 
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                position: relative;
                overflow: hidden;
            }
            .card-hover:hover { 
                transform: translateY(-6px) scale(1.02); 
                box-shadow: 0 12px 30px -8px rgba(0, 0, 0, 0.35);
            }
            .card-hover::before {
                content: '';
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
                transition: left 0.6s ease;
            }
            .card-hover:hover::before {
                left: 100%;
            }
            .rank-1 { 
                border-left: 5px solid theme('colors.billiard.gold');
                background: linear-gradient(90deg, rgba(255,215,0,0.1) 0%, rgba(15, 23, 42, 0) 100%);
                position: relative;
            }
            .rank-1::after {
                content: '';
                position: absolute;
                top: 0;
                right: 0;
                width: 40px;
                height: 40px;
                background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23FFD700"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>') no-repeat center;
                background-size: contain;
                opacity: 0.3;
            }
            .rank-2 { 
                border-left: 5px solid theme('colors.billiard.silver');
                background: linear-gradient(90deg, rgba(192,192,192,0.1) 0%, rgba(15, 23, 42, 0) 100%);
            }
            .rank-3 { 
                border-left: 5px solid theme('colors.billiard.bronze');
                background: linear-gradient(90deg, rgba(205,127,50,0.1) 0%, rgba(15, 23, 42, 0) 100%);
            }
            .progress-bar {
                height: 8px;
                border-radius: 4px;
                background: #334155;
                overflow: hidden;
                position: relative;
            }
            .progress-fill {
                height: 100%;
                background: linear-gradient(90deg, theme('colors.billiard.light'), #4ade80);
                border-radius: 4px;
                transition: width 0.5s ease;
                position: relative;
            }
            .progress-fill::after {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
                animation: progressShine 1.5s infinite;
            }
            @keyframes progressShine {
                0% { transform: translateX(-100%); }
                100% { transform: translateX(100%); }
            }
            .tab-active {
                background: theme('colors.billiard.green');
                color: white;
                box-shadow: 0 2px 0 0 theme('colors.billiard.light');
                transform: translateY(-2px);
                transition: all 0.3s ease;
            }
            .rank-tab {
                position: relative;
                overflow: hidden;
            }
            .rank-tab::before {
                content: '';
                position: absolute;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 2px;
                background: theme('colors.billiard.light');
                transform: scaleX(0);
                transition: transform 0.3s ease;
            }
            .rank-tab:hover::before {
                transform: scaleX(1);
            }
            /* 好友选择标签样式（深色模式） */
            .friend-tag {
                @apply px-4 py-2 rounded-lg border transition-all cursor-pointer;
                position: relative;
                overflow: hidden;
            }
            .friend-tag-unselected {
                @apply border-gray-700 bg-billiard-darker hover:border-billiard-light hover:bg-billiard-gray/50;
            }
            .friend-tag-selected {
                @apply border-billiard-light bg-billiard-light/10 text-billiard-light;
                box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
            }
            /* 计分数字渐变+动态效果 */
            .score-text {
                @apply text-4xl md:text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-billiard-light to-billiard-accent;
                transition: all 0.2s ease-in-out;
                position: relative;
            }
            .score-text::before {
                content: attr(data-score);
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: linear-gradient(90deg, #4ade80, #F5D76E);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            .score-text:hover::before {
                opacity: 1;
            }
            .score-text:active {
                transform: scale(0.95);
            }
            .score-change {
                animation: scorePulse 0.3s ease-in-out;
            }
            @keyframes scorePulse {
                0% { transform: scale(1); }
                50% { transform: scale(1.2); }
                100% { transform: scale(1); }
            }
            /* 模态框样式（深色模式） */
            .modal-backdrop {
                @apply fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4;
                animation: modalFadeIn 0.3s ease-out;
            }
            @keyframes modalFadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
            .modal-content {
                @apply bg-billiard-darker border border-gray-700 rounded-2xl shadow-modal w-full max-w-md p-6 md:p-8;
                animation: modalSlideIn 0.3s ease-out;
                position: relative;
                overflow: hidden;
            }
            @keyframes modalSlideIn {
                from { transform: translateY(50px); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }
            .modal-content::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 4px;
                background: linear-gradient(90deg, theme('colors.billiard.light'), #4ade80);
            }
            /* 按钮效果 */
            button {
                position: relative;
                overflow: hidden;
                transition: all 0.3s ease;
            }
            button::before {
                content: '';
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
                transition: left 0.6s ease;
            }
            button:hover::before {
                left: 100%;
            }
            /* 淡入动画 */
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in {
                animation: fadeIn 0.8s ease-out forwards;
            }
            /* 背景粒子效果 */
            .particle-bg {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: -1;
            }
            .particle {
                position: absolute;
                width: 4px;
                height: 4px;
                background: rgba(34, 197, 94, 0.3);
                border-radius: 50%;
                animation: particleFloat 10s infinite linear;
            }
            @keyframes particleFloat {
                0% {
                    transform: translateY(100vh) translateX(0);
                    opacity: 0;
                }
                10% {
                    opacity: 1;
                }
                90% {
                    opacity: 1;
                }
                100% {
                    transform: translateY(-100px) translateX(100px);
                    opacity: 0;
                }
            }
            
            /* 跑马灯样式 */
            .marquee-container {
                position: relative;
            }
            .marquee-content {
                animation: marquee 20s linear infinite;
            }
            @keyframes marquee {
                0% {
                    transform: translateX(100%);
                }
                100% {
                    transform: translateX(-100%);
                }
            }
            .marquee-container:hover .marquee-content {
                animation-play-state: paused;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-b from-billiard-dark to-billiard-darker font-sans text-billiard-text min-h-screen flex flex-col">
    <!-- 页面头部 -->
    <header class="bg-gradient-to-r from-[#306339] to-[#4CAF50] text-white py-8 shadow-lg relative overflow-hidden">
        <!-- 背景动效 -->
        <div class="absolute inset-0 opacity-10">
            <div class="absolute top-0 left-0 w-20 h-20 bg-white rounded-full blur-3xl animate-pulse"></div>
            <div class="absolute bottom-0 right-0 w-32 h-32 bg-white rounded-full blur-3xl animate-pulse" style="animation-delay: 1s;"></div>
            <div class="absolute top-1/2 left-1/2 w-24 h-24 bg-white rounded-full blur-3xl animate-pulse" style="animation-delay: 2s;"></div>
        </div>
        <div class="container mx-auto px-4 md:px-6 relative z-10">
            <h1 class="text-[clamp(2.5rem,7vw,4rem)] font-bold text-center tracking-wide animate-fade-in">
                <i class="fa-solid fa-circle-pool mr-3"></i>有道球王👑风云榜
            </h1>
            <p class="text-center text-gray-100 mt-3 text-lg opacity-90 animate-fade-in" style="animation-delay: 0.5s;">
                失误并不可怕，怕的是再也不敢果断出杆
            </p>
            <div class="text-center text-gray-200 mt-2 text-base animate-fade-in" style="animation-delay: 1s;">
                <span id="currentDateTime"></span>
            </div>
        </div>
    </header>

    <!-- 主要内容区 -->
    <main class="flex-grow container mx-auto px-4 md:px-6 py-10">
        <!-- 2. 开房对战区域 -->
        <section class="bg-billiard-darker rounded-2xl shadow-card p-6 md:p-8 mb-8 card-hover border border-gray-800">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl md:text-2xl font-bold flex items-center">
                    <i class="fa-solid fa-door-open mr-3 text-billiard-light text-xl"></i>开房对战
                </h2>
                <button id="openFriendModalBtn" class="px-4 py-2 bg-gray-700 text-billiard-textLight rounded-lg hover:bg-gray-600 transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-users"></i>好友管理
                </button>
            </div>
            
            <!-- 跑马灯：显示正在战斗的好友 -->
            <div class="mb-4">
                <div class="flex items-center gap-2 mb-2">
                    <i class="fa-solid fa-running text-billiard-light"></i>
                    <h3 class="font-semibold text-sm text-billiard-textLight">战斗状态</h3>
                </div>
                <div class="marquee-container bg-billiard-gray/50 border border-gray-700 rounded-lg p-3 overflow-hidden">
                    <div id="battleMarquee" class="marquee-content flex items-center gap-4 whitespace-nowrap">
                        <span class="text-billiard-textLight text-sm">暂无好友在战斗</span>
                    </div>
                </div>
            </div>
            
            <div class="space-y-4">
                <h3 class="font-semibold text-lg text-billiard-textLight">选择参与对战的好友（可多选）</h3>
                <div id="friendCheckboxes" class="max-h-[220px] overflow-y-auto p-4 border border-gray-800 rounded-xl bg-billiard-gray">
                    <!-- 空状态 -->
                    <div id="friendEmptyState" class="flex flex-col items-center justify-center py-8 text-billiard-textLight">
                        <i class="fa-solid fa-user-plus text-3xl mb-3"></i>
                        <p class="text-sm">暂无好友，请先新增好友</p>
                    </div>
                    <!-- 好友标签列表 -->
                    <div id="friendTagList" class="flex flex-wrap gap-3 hidden"></div>
                </div>
                <button id="startGameBtn" class="w-full md:w-auto px-8 py-4 bg-billiard-accent text-billiard-dark font-medium rounded-lg hover:bg-billiard-accent/90 transition-colors shadow-md hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:shadow-none text-lg">
                    <i class="fa-solid fa-play mr-2"></i>开始对战
                </button>
            </div>
        </section>

        <!-- 好友管理模态框 -->
        <div id="friendModal" class="modal-backdrop hidden" style="display: none;">
            <div class="modal-content max-w-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-billiard-text">好友管理</h3>
                    <button id="closeFriendModalBtn" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-700 hover:bg-gray-600 transition-colors text-billiard-textLight">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div class="space-y-6">
                    <!-- 新增好友 -->
                    <div class="flex flex-wrap gap-3 items-center">
                        <input type="text" id="newFriendName" placeholder="输入好友姓名（如：张三）" 
                               class="flex-1 min-w-[200px] px-4 py-3 border border-gray-700 rounded-lg bg-billiard-gray focus:outline-none focus:ring-2 focus:ring-billiard-light/50 focus:border-billiard-light transition-all text-billiard-text">
                        <button id="addFriendBtn" class="px-6 py-3 bg-billiard-light text-white rounded-lg hover:bg-billiard-green transition-colors shadow-md hover:shadow-lg">
                            <i class="fa-solid fa-plus mr-2"></i>新增好友
                        </button>
                    </div>
                    <!-- 删除好友 -->
                    <div class="flex flex-wrap gap-3 items-center">
                        <select id="deleteFriendSelect" class="flex-1 min-w-[200px] px-4 py-3 border border-gray-700 rounded-lg bg-billiard-gray focus:outline-none focus:ring-2 focus:ring-billiard-light/50 focus:border-billiard-light transition-all text-billiard-text">
                            <option value="">选择要删除的好友</option>
                        </select>
                        <button id="deleteFriendBtn" class="px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors shadow-md hover:shadow-lg">
                            <i class="fa-solid fa-trash mr-2"></i>删除好友
                        </button>
                    </div>
                    <!-- 好友列表 -->
                    <div>
                        <h4 class="font-semibold text-billiard-textLight mb-3">好友列表</h4>
                        <div id="friendList" class="space-y-2 max-h-[300px] overflow-y-auto p-3 border border-gray-800 rounded-xl bg-billiard-gray">
                            <!-- 好友列表将通过JS动态生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 对战页面 -->
        <div id="battlePage" class="fixed inset-0 bg-billiard-darker z-50 hidden flex flex-col">
            <!-- 对战页面头部 -->
            <header class="bg-gradient-to-r from-[#306339] to-[#4CAF50] text-white py-4 shadow-lg">
                <div class="container mx-auto px-4 flex justify-between items-center">
                    <h1 class="text-xl md:text-2xl font-bold flex items-center">
                        <i class="fa-solid fa-circle-pool mr-2"></i>实时对战
                    </h1>
                    <button id="exitBattleBtn" class="px-4 py-2 bg-gray-700/50 text-white rounded-lg hover:bg-gray-600/50 transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-arrow-left"></i>退出对战
                    </button>
                </div>
            </header>
            <!-- 对战页面内容 -->
            <main class="flex-grow overflow-y-auto container mx-auto px-4 py-6" style="-webkit-overflow-scrolling: touch; scroll-behavior: smooth;">
                <!-- 计时器 -->
                <div id="battleTimer" class="text-center text-billiard-light font-mono text-xl md:text-2xl mb-4 py-3 bg-billiard-gray rounded-xl shadow-lg">
                    比赛时长: 00:00:00
                </div>
                <!-- 大计分屏 -->
                <div class="mb-4">
                    <h2 class="text-2xl font-bold text-center text-billiard-text mb-3">
                        <i class="fa-solid fa-trophy mr-2 text-billiard-accent"></i>实时计分大屏
                    </h2>
                    <div id="scoreBoardDisplay" class="bg-black rounded-2xl p-4 shadow-xl border-4 border-billiard-green/30">
                        <div id="largeScoreList" class="space-y-3"></div>
                    </div>
                </div>
                <!-- 操作面板 -->
                <div id="battleScoreBoard" class="mb-6">
                    <h2 class="text-xl font-bold text-center text-billiard-text mb-3">
                        <i class="fa-solid fa-list-ol mr-2 text-billiard-accent"></i>操作面板
                    </h2>
                    <div id="battlePlayerScoreList" class="space-y-3"></div>
                </div>
                <!-- 操作按钮 -->
                <div class="mb-8">
                    <button id="battleEndGameBtn" class="w-full px-6 py-4 bg-green-600 text-white font-medium rounded-lg hover:bg-green-700 transition-colors shadow-md hover:shadow-lg text-lg">
                        <i class="fa-solid fa-flag-checkered mr-2"></i>结束战斗
                    </button>
                </div>
            </main>
        </div>

        <!-- 3. 排行榜区域 -->
        <section class="bg-billiard-darker rounded-2xl shadow-card p-6 md:p-8 mb-8 card-hover border border-gray-800">
            <h2 class="text-xl md:text-2xl font-bold mb-6 flex items-center">
                <i class="fa-solid fa-ranking-star mr-3 text-billiard-light text-xl"></i>得分排行榜
            </h2>
            
            <!-- 时间维度标签 -->
            <div class="flex flex-wrap gap-2 mb-8">
                <button class="rank-tab tab-active px-5 py-2 rounded-lg font-medium card-hover" data-tab="total">
                    总榜
                </button>
                <button class="rank-tab px-5 py-2 rounded-lg font-medium bg-gray-700 hover:bg-gray-600 card-hover transition-colors" data-tab="week">
                    周榜
                </button>
                <button class="rank-tab px-5 py-2 rounded-lg font-medium bg-gray-700 hover:bg-gray-600 card-hover transition-colors" data-tab="month">
                    月榜
                </button>
                <button class="rank-tab px-5 py-2 rounded-lg font-medium bg-gray-700 hover:bg-gray-600 card-hover transition-colors" data-tab="season">
                    季榜
                </button>
                <button class="rank-tab px-5 py-2 rounded-lg font-medium bg-gray-700 hover:bg-gray-600 card-hover transition-colors" data-tab="year">
                    2026年榜
                </button>
            </div>
            
            <!-- 排行榜内容 -->
            <div id="rankContainer">
                <!-- 总榜（默认显示） -->
                <div id="total-tab" class="rank-content block">
                    <div id="totalRankList" class="space-y-3"></div>
                </div>
                
                <!-- 周榜 -->
                <div id="week-tab" class="rank-content hidden">
                    <div id="weekRankList" class="space-y-3"></div>
                </div>
                
                <!-- 月榜 -->
                <div id="month-tab" class="rank-content hidden">
                    <div id="monthRankList" class="space-y-3"></div>
                </div>
                
                <!-- 季榜 -->
                <div id="season-tab" class="rank-content hidden">
                    <div id="seasonRankList" class="space-y-3"></div>
                </div>
                
                <!-- 年榜（2026） -->
                <div id="year-tab" class="rank-content hidden">
                    <div id="yearRankList" class="space-y-3"></div>
                </div>
            </div>
        </section>

        <!-- 4. 比赛记录区域 -->
        <section class="bg-billiard-darker rounded-2xl shadow-card p-6 md:p-8 mb-8 card-hover border border-gray-800">
            <h2 class="text-xl md:text-2xl font-bold mb-6 flex items-center">
                <i class="fa-solid fa-history mr-3 text-billiard-light text-xl"></i>比赛记录
            </h2>
            <div id="matchRecordList" class="space-y-4 mb-6"></div>
            <div id="paginationControls" class="flex justify-center items-center gap-2 mt-4 hidden">
                <button id="prevPageBtn" class="px-4 py-2 bg-gray-700 text-billiard-text rounded-lg hover:bg-gray-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <div id="pageInfo" class="text-billiard-textLight text-sm">
                    第 1 页，共 1 页
                </div>
                <button id="nextPageBtn" class="px-4 py-2 bg-gray-700 text-billiard-text rounded-lg hover:bg-gray-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </section>

        <!-- 5. 单对单胜率分析 -->
        <section class="bg-billiard-darker rounded-2xl shadow-card p-6 md:p-8 mb-8 card-hover border border-gray-800">
            <h2 class="text-xl md:text-2xl font-bold mb-6 flex items-center">
                <i class="fa-solid fa-chart-line mr-3 text-billiard-light text-xl"></i>单对单胜率分析
            </h2>
            <div class="space-y-6">
                <div class="flex flex-wrap gap-4">
                    <div class="flex-1 min-w-[200px]">
                        <label class="block text-sm font-medium text-billiard-textLight mb-2">选择球友1</label>
                        <select id="player1Select" class="w-full px-4 py-3 border border-gray-700 rounded-lg bg-billiard-gray focus:outline-none focus:ring-2 focus:ring-billiard-light/50 focus:border-billiard-light transition-all text-billiard-text">
                            <option value="">请选择球友</option>
                        </select>

        // ========== 全局变量初始化 ==========

        localStorage.removeItem('billiardFriends');

        let matchRecords = [];

        let selectedPlayers = [];
        let currentTime = new Date();
        
        // 初始更新UI
        updateStartBtnStatus();
        updateFriendCheckboxes();
        updateAllRankLists();
        
        // 管理员账号密码
        const ADMIN_CREDENTIALS = {
            username: 'admin',
            password: 'admin123'

        console.log('Initial data:', {
            friends: friends.length,
            matchRecords: matchRecords.length,
            currentUser: currentUser
        }); 

        // ========== 用户身份系统 ==========
        function loginAsAdmin() {
            currentUser = { role: 'admin', name: '管理员' };
            localStorage.setItem('billiardUser', JSON.stringify(currentUser));
            updateUIForRole();
        }

        function switchToPlayer() {
            currentUser = { role: 'player', name: '球友' };
            localStorage.setItem('billiardUser', JSON.stringify(currentUser));
            updateUIForRole();
        }

        function isAdmin() {
            return currentUser && currentUser.role === 'admin';
        }

        function updateUIForRole() {
            // 显示登录状态
            const header = document.querySelector('header');
            const loginStatus = document.createElement('div');
            loginStatus.id = 'loginStatus';
            loginStatus.className = 'absolute top-4 right-4 flex items-center gap-2';
            
            if (isAdmin()) {
                loginStatus.innerHTML = `
                    <span class="text-sm text-billiard-light">
                        ${currentUser.name} (管理员)
                    </span>
                    <button id="switchToPlayerBtn" class="px-3 py-1 bg-gray-700/50 rounded-lg hover:bg-gray-600/50 transition-colors text-xs">
                        切换到球友端
                    </button>
                `;
            } else {
                loginStatus.innerHTML = `
                    <span class="text-sm text-billiard-textLight">
                        ${currentUser.name} (球友)
                    </span>
                    <button id="openAdminLoginBtn" class="px-3 py-1 bg-billiard-light/20 text-billiard-light rounded-lg hover:bg-billiard-light/30 transition-colors text-xs">
                        切换到管理端
                    </button>
                `;
            }
            
            // 移除旧的登录状态
            const oldStatus = document.getElementById('loginStatus');
            if (oldStatus) {
                oldStatus.remove();
            }
            header.appendChild(loginStatus);

            // 绑定按钮事件
            if (isAdmin()) {
                document.getElementById('switchToPlayerBtn').addEventListener('click', switchToPlayer);
            } else {
                document.getElementById('openAdminLoginBtn').addEventListener('click', openAdminLoginModal);
            }

            // 根据角色显示/隐藏管理功能
            if (!isAdmin()) {
                // 隐藏好友管理按钮
                document.getElementById('openFriendModalBtn').classList.add('hidden');
                // 隐藏编辑按钮（后续添加）
            } else {
                // 显示好友管理按钮
                document.getElementById('openFriendModalBtn').classList.remove('hidden');
                // 重新绑定好友管理按钮事件
                const openFriendModalBtn = document.getElementById('openFriendModalBtn');
                // 先移除可能存在的事件监听器
                openFriendModalBtn.replaceWith(openFriendModalBtn.cloneNode(true));
                const newOpenFriendModalBtn = document.getElementById('openFriendModalBtn');
                newOpenFriendModalBtn.addEventListener('click', () => {
                    const modal = document.getElementById('friendModal');
                    modal.style.display = 'flex';
                    modal.classList.remove('hidden');
                    document.body.style.overflow = 'hidden';
                    updateFriendList();
                    
                    // 重新绑定新增好友按钮事件
                    const addFriendBtn = document.getElementById('addFriendBtn');
                    addFriendBtn.replaceWith(addFriendBtn.cloneNode(true));
                    const newAddFriendBtn = document.getElementById('addFriendBtn');
                    newAddFriendBtn.addEventListener('click', async () => {
                        if (!isAdmin()) {
                            alert('只有管理员才能添加好友！');
                            return;
                        }
                        const name = document.getElementById('newFriendName').value.trim();
                        if (!name) {
                            alert('请输入好友姓名！');
                            return;
                        }
                        if (friends.some(f => f.name === name)) {
                            alert('该好友已存在！');
                            return;
                        }
                        await addFriend(name);
                        document.getElementById('newFriendName').value = '';
                    });
                    
                    // 重新绑定删除好友按钮事件
                    const deleteFriendBtn = document.getElementById('deleteFriendBtn');
                    deleteFriendBtn.replaceWith(deleteFriendBtn.cloneNode(true));
                    const newDeleteFriendBtn = document.getElementById('deleteFriendBtn');
                    newDeleteFriendBtn.addEventListener('click', async () => {
                        if (!isAdmin()) {
                            alert('只有管理员才能删除好友！');
                            return;
                        }
                        const name = document.getElementById('deleteFriendSelect').value;
                        if (!name) {
                            alert('请选择要删除的好友！');
                            return;
                        }
                        if (confirm(`确定删除好友【${name}】？所有数据将被清除！`)) {
                            await deleteFriend(name);
                            document.getElementById('deleteFriendSelect').value = '';
                        }
                    });
                    
                    // 重新绑定关闭按钮事件
                    const closeFriendModalBtn = document.getElementById('closeFriendModalBtn');
                    closeFriendModalBtn.replaceWith(closeFriendModalBtn.cloneNode(true));
                    const newCloseFriendModalBtn = document.getElementById('closeFriendModalBtn');
                    newCloseFriendModalBtn.addEventListener('click', () => {
                        const modal = document.getElementById('friendModal');
                        modal.style.display = 'none';
                        modal.classList.add('hidden');
                        document.body.style.overflow = '';
                    });
                    
                    // 重新绑定模态框背景点击事件
                    const friendModal = document.getElementById('friendModal');
                    friendModal.addEventListener('click', (e) => {
                        if (e.target === friendModal) {
                            const modal = document.getElementById('friendModal');
                            modal.style.display = 'none';
                            modal.classList.add('hidden');
                            document.body.style.overflow = '';
                        }
                    });
                });
                // 显示编辑按钮（后续添加）
            }
            
            // 更新好友选择列表
            updateFriendCheckboxes();
            // 重新绑定开始对战按钮事件
            bindStartGameBtn();
            // 重新渲染比赛记录，显示/隐藏编辑删除按钮
            updateMatchRecords();
        }

        // 管理员登录相关函数
        function openAdminLoginModal() {
            const modal = document.getElementById('adminLoginModal');
            modal.style.display = 'flex';
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeAdminLoginModal() {
            const modal = document.getElementById('adminLoginModal');
            modal.style.display = 'none';
            modal.classList.add('hidden');
            document.body.style.overflow = '';
            // 清空输入框
            document.getElementById('adminUsername').value = '';
            document.getElementById('adminPassword').value = '';
        }

        function submitAdminLogin() {
            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value.trim();
            
            if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                loginAsAdmin();
                closeAdminLoginModal();
                alert('管理员登录成功！');
            } else {
                alert('账号或密码错误！');
            }
        }

        // 绑定管理员登录弹窗事件
        document.getElementById('closeAdminLoginBtn').addEventListener('click', closeAdminLoginModal);
        document.getElementById('cancelAdminLoginBtn').addEventListener('click', closeAdminLoginModal);
        document.getElementById('submitAdminLoginBtn').addEventListener('click', submitAdminLogin);

        // 点击弹窗背景关闭
        document.getElementById('adminLoginModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('adminLoginModal')) {
                closeAdminLoginModal();
            }
        });

        // 全局变量
        let matchStartTime = null;
        let matchTimerInterval = null;
        let ongoingBattles = []; // 存储正在战斗的好友
        let currentPage = 1; // 当前页码
        const recordsPerPage = 5; // 每页显示的记录数

        // 更新战斗跑马灯
        function updateBattleMarquee() {
            const marquee = document.getElementById('battleMarquee');
            
            // 计算总比赛人数和总比赛次数
            const allPlayers = new Set();
            let totalGames = 0;
            
            matchRecords.forEach(record => {
                record.players.forEach(player => {
                    allPlayers.add(player.name);
                });
                // 计算每场比赛的总场次（所有玩家得分之和）
                const gameCount = record.players.reduce((sum, player) => sum + player.score, 0);
                totalGames += gameCount;
            });
            
            const totalPlayers = allPlayers.size;
            
            if (totalGames === 0) {
                marquee.innerHTML = '<span class="text-billiard-textLight text-sm">暂无比赛记录</span>';
                return;
            }
            
            // 显示总比赛人数和总比赛次数
            const content = `
                <span class="flex items-center gap-2 text-billiard-light text-sm">
                    <i class="fa-solid fa-trophy text-billiard-accent"></i>
                    已有 ${totalPlayers} 位球友进行了 ${totalGames} 场比赛
                </span>
            `;
            
            marquee.innerHTML = content;
        }

        // 绑定开始对战按钮事件
        function bindStartGameBtn() {
            const startGameBtn = document.getElementById('startGameBtn');
            if (!startGameBtn) {
                console.error('startGameBtn元素不存在');
                return;
            }
            
            // 移除所有现有的事件监听器
            const newStartGameBtn = startGameBtn.cloneNode(true);
            startGameBtn.parentNode.replaceChild(newStartGameBtn, startGameBtn);
            
            // 绑定新的事件监听器
            newStartGameBtn.addEventListener('click', function() {
                console.log('开始对战按钮点击');
                console.log('selectedFriendNames:', selectedFriendNames);
                
                if (selectedFriendNames.length < 2) {
                    alert('请至少选择2位好友！');
                    return;
                }
                
                console.log('好友数量足够，准备进入对战页面');
                
                // 准备对战数据
                selectedPlayers = selectedFriendNames.map(name => ({ name, score: 0 }));
                console.log('selectedPlayers:', selectedPlayers);
                
                // 播放开始战斗声音
                playStartGameSound();
                
                // 记录正在战斗的好友
                console.log('检查ongoingBattles变量:', typeof ongoingBattles);
                const battleId = Date.now();
                const battle = {
                    id: battleId,
                    players: [...selectedFriendNames],
                    startTime: new Date()
                };
                console.log('准备添加战斗记录:', battle);
                ongoingBattles.push(battle);
                updateBattleMarquee();
                console.log('战斗记录已添加');
                console.log('当前ongoingBattles:', ongoingBattles);
                
                // 打开对战页面
                const battlePage = document.getElementById('battlePage');
                console.log('battlePage元素:', battlePage);
                if (battlePage) {
                    // 强制显示对战页面
                    battlePage.style.display = 'flex';
                    battlePage.style.position = 'fixed';
                    battlePage.style.top = '0';
                    battlePage.style.left = '0';
                    battlePage.style.width = '100%';
                    battlePage.style.height = '100%';
                    battlePage.style.zIndex = '9999';
                    battlePage.classList.remove('hidden');
                    console.log('对战页面已显示');
                    console.log('battlePage样式:', getComputedStyle(battlePage));
                } else {
                    console.error('battlePage元素不存在');
                }
                
                // 渲染对战页面计分板
                try {
                    renderBattleScoreBoard();
                    console.log('计分板渲染成功');
                } catch (error) {
                    console.error('渲染计分板失败:', error);
                }
                
                // 启动比赛计时器
                try {
                    startMatchTimer();
                    console.log('计时器已启动');
                } catch (error) {
                    console.error('启动计时器失败:', error);
                }
            });
        }

        // 从API加载好友数据
        async function loadFriendsFromAPI() {
            try {
                const response = await fetch('http://badboy.vxni.ink/api/friends.php');
                const data = await response.json();
                friends = data;
                // 重新计算好友统计数据
                recalculateFriendStats();
                updateFriendCheckboxes();
                updateAllRankLists();
                // 更新单对单胜率分析的球友选择下拉框
                updateHeadToHeadSelects();
            } catch (error) {
                console.error('加载好友数据失败:', error);
            }
        }

        // 从API加载比赛记录
        async function loadMatchesFromAPI() {
            try {
                const response = await fetch('http://badboy.vxni.ink/api/matches.php');
                const data = await response.json();
                matchRecords = data;
                // 重新计算好友统计数据
                recalculateFriendStats();
                updateMatchRecords();
                updateAllRankLists();
            } catch (error) {
                console.error('加载比赛记录失败:', error);
            }
        }

        // 添加好友
        async function addFriend(name) {
            try {
                const response = await fetch('http://badboy.vxni.ink/api/friends.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: name })
                });
                const data = await response.json();
                if (data.success) {
                    await loadFriendsFromAPI();
                } else {
                    alert('添加好友失败: ' + data.error);
                }
            } catch (error) {
                console.error('添加好友失败:', error);
                alert('添加好友失败，请检查网络连接');
            }
        }

        // 删除好友
        async function deleteFriend(name) {
            try {
                const response = await fetch(`http://badboy.vxni.ink/api/friends.php?name=${encodeURIComponent(name)}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                if (data.success) {
                    await loadFriendsFromAPI();
                    await loadMatchesFromAPI();
                } else {
                    alert('删除好友失败: ' + data.error);
                }
            } catch (error) {
                console.error('删除好友失败:', error);
                alert('删除好友失败，请检查网络连接');
            }
        }

        // 保存比赛记录到API
        async function saveMatchToAPI(match) {
            try {
                const response = await fetch('http://badboy.vxni.ink/api/matches.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(match)

        async function getNetworkTime() {
            try {
                const response = await fetch('https://worldtimeapi.org/api/utc');
                if (response.ok) {
                    const data = await response.json();
                    currentTime = new Date(data.utc_datetime);
                } else {
                    currentTime = new Date();
                    currentTime.setFullYear(2026);
                }
            } catch (error) {
                currentTime = new Date();
                currentTime.setFullYear(2026);
            }
        }

        // ========== 时间工具函数（基于实时时间） ==========
        const DateUtils = {
            getWeekRange() {
                // 创建currentTime的深拷贝，避免修改原始值
                const now = new Date(currentTime);
                const day = now.getDay() || 7;
                // 计算本周一的日期
                const start = new Date(now);
                start.setDate(now.getDate() - day + 1);
                start.setHours(0, 0, 0, 0);
                // 计算本周日的日期
                const end = new Date(start);
                end.setDate(start.getDate() + 6);
                end.setHours(23, 59, 59, 999);
                return { start: start.getTime(), end: end.getTime() };
            },
            getMonthRange() {
                // 创建currentTime的深拷贝，避免修改原始值
                const now = new Date(currentTime);
                const start = new Date(now.getFullYear(), now.getMonth(), 1);
                start.setHours(0, 0, 0, 0);
                const end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
                end.setHours(23, 59, 59, 999);
                return { start: start.getTime(), end: end.getTime() };
            },
            getSeasonRange() {
                // 创建currentTime的深拷贝，避免修改原始值
                const now = new Date(currentTime);
                const month = now.getMonth();
                const seasonStartMonth = Math.floor(month / 3) * 3;
                const start = new Date(now.getFullYear(), seasonStartMonth, 1);
                start.setHours(0, 0, 0, 0);
                const end = new Date(now.getFullYear(), seasonStartMonth + 3, 0);
                end.setHours(23, 59, 59, 999);
                return { start: start.getTime(), end: end.getTime() };
            },
            getYearRange() {
                const start = new Date(2026, 0, 1);
                start.setHours(0, 0, 0, 0);
                const end = new Date(2026, 11, 31);
                end.setHours(23, 59, 59, 999);
                return { start: start.getTime(), end: end.getTime() };
            },
            isInRange(timestamp, range) {
                return timestamp >= range.start && timestamp <= range.end;
            }
        };

        // ========== 重新计算好友统计数据 ==========
        function recalculateFriendStats() {
            friends.forEach(friend => {
                friend.total = { win: 0, lose: 0, winRate: '0.0%' };
                friend.week = { win: 0, lose: 0, winRate: '0.0%' };
                friend.month = { win: 0, lose: 0, winRate: '0.0%' };
                friend.season = { win: 0, lose: 0, winRate: '0.0%' };
                friend.year = { win: 0, lose: 0, winRate: '0.0%' };
            });

            matchRecords.forEach(record => {
                const weekRange = DateUtils.getWeekRange();
                const monthRange = DateUtils.getMonthRange();
                const seasonRange = DateUtils.getSeasonRange();
                const yearRange = DateUtils.getYearRange();
                const inWeek = DateUtils.isInRange(record.timestamp, weekRange);
                const inMonth = DateUtils.isInRange(record.timestamp, monthRange);
                const inSeason = DateUtils.isInRange(record.timestamp, seasonRange);
                const inYear = DateUtils.isInRange(record.timestamp, yearRange);

                record.players.forEach(player => {
                    const friend = friends.find(f => f.name === player.name);
                    if (!friend) return;

                    const opponentScores = record.players
                        .filter(p => p.name !== player.name)
                        .reduce((sum, p) => sum + p.score, 0);

                    friend.total.win += player.score;
                    friend.total.lose += opponentScores;

                    if (inWeek) {
                        friend.week.win += player.score;
                        friend.week.lose += opponentScores;
                    }
                    if (inMonth) {
                        friend.month.win += player.score;
                        friend.month.lose += opponentScores;
                    }
                    if (inSeason) {
                        friend.season.win += player.score;
                        friend.season.lose += opponentScores;
                    }
                    if (inYear) {
                        friend.year.win += player.score;
                        friend.year.lose += opponentScores;
                    }
                });
            });

            friends.forEach(friend => {
                ['total', 'week', 'month', 'season', 'year'].forEach(dimension => {
                    const total = friend[dimension].win + friend[dimension].lose;
                    friend[dimension].winRate = total === 0 
                        ? '0.0%' 
                        : ((friend[dimension].win / total) * 100).toFixed(1) + '%';
                });
            });
        }

        // 更新比赛计时器
        function updateMatchTimer() {
            if (!matchStartTime) return;
            
            const now = new Date();
            const elapsed = now - matchStartTime;
            const seconds = Math.floor(elapsed / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            
            const formattedTime = `${hours.toString().padStart(2, '0')}:${(minutes % 60).toString().padStart(2, '0')}:${(seconds % 60).toString().padStart(2, '0')}`;
            document.getElementById('battleTimer').textContent = `比赛时长: ${formattedTime}`;
        }
        
        // 停止比赛计时器
        function stopMatchTimer() {
            if (matchTimerInterval) {
                clearInterval(matchTimerInterval);
                matchTimerInterval = null;
            }
            
            // 计算比赛时长
            if (matchStartTime) {
                const now = new Date();
                const elapsed = now - matchStartTime;
                matchStartTime = null;
                return elapsed;
            }
            return 0;
        }

        // 保存编辑数据（核心修复）
        function saveEditData() {
            try {
                console.log('saveEditData called');
                
                // 1. 获取并校验输入数据
                const friendIndex = parseInt(document.getElementById('editFriendIndex').value);
                const dimension = document.getElementById('editDimension').value;
                let winScore = parseInt(document.getElementById('editWinScore').value);
                let loseScore = parseInt(document.getElementById('editLoseScore').value);

                console.log('Save data:', {
                    friendIndex,
                    dimension,
                    winScore,
                    loseScore
                });

                // 空值/非数字处理
                if (isNaN(winScore)) winScore = 0;
                if (isNaN(loseScore)) loseScore = 0;
                if (winScore < 0) winScore = 0;
                if (loseScore < 0) loseScore = 0;

                // 2. 校验参数有效性
                if (friendIndex < 0 || friendIndex >= friends.length) {
                    alert('好友数据不存在！');
                    return;
                }
                
                // 修复：确保dimension是有效的统计维度
                const validDimensions = ['total', 'week', 'month', 'season', 'year'];
                if (!dimension || !validDimensions.includes(dimension)) {
                    alert('无效的统计维度！');
                    return;
                }

                // 3. 直接修改原数组中的好友数据（关键修复）
                const friend = friends[friendIndex];
                friend[dimension].win = winScore;
                friend[dimension].lose = loseScore;
                
                // 4. 重新计算胜率
                const total = winScore + loseScore;
                friend[dimension].winRate = total === 0 
                    ? '0.0%' 
                    : ((winScore / total) * 100).toFixed(1) + '%';

                // 5. 保存并刷新视图
                saveFriendsToLocal();
                closeEditModal();
                
                alert(`✅ 已成功修改${friend.name}的${dimension}数据！`);
                
            } catch (error) {
                console.error('保存编辑数据失败:', error);
                alert(`保存失败：${error.message}`);
            }
        }

        function updateMatchRecords() {
            const list = document.getElementById('matchRecordList');
            const pagination = document.getElementById('paginationControls');
            
            if (matchRecords.length === 0) {
                list.innerHTML = `

                    </div>
                `;
                pagination.classList.add('hidden');
                return;
            }
            
            // 按时间倒序排序
            const sortedRecords = [...matchRecords].sort((a, b) => b.timestamp - a.timestamp);
            
            // 计算总页数
            const totalPages = Math.ceil(sortedRecords.length / recordsPerPage);
            
            // 确保当前页码在有效范围内
            if (currentPage > totalPages) {
                currentPage = totalPages;
            }
            if (currentPage < 1) {
                currentPage = 1;
            }
            
            // 计算当前页的记录范围
            const startIndex = (currentPage - 1) * recordsPerPage;
            const endIndex = startIndex + recordsPerPage;
            const currentPageRecords = sortedRecords.slice(startIndex, endIndex);
            
            // 显示当前页的记录
            list.innerHTML = '';
            currentPageRecords.forEach((record, index) => {
                const actualIndex = startIndex + index;
                const date = new Date(record.timestamp);
                const timeString = date.toLocaleString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
                
                // 格式化比赛时长
                function formatDuration(duration) {
                    if (!duration) return '00:00:00';
                    const seconds = Math.floor(duration / 1000);
                    const minutes = Math.floor(seconds / 60);
                    const hours = Math.floor(minutes / 60);
                    return `${hours.toString().padStart(2, '0')}:${(minutes % 60).toString().padStart(2, '0')}:${(seconds % 60).toString().padStart(2, '0')}`;
                }
                
                const item = document.createElement('div');
                item.className = 'bg-billiard-gray/30 border border-gray-800 rounded-xl p-4 card-hover';
                
                item.innerHTML = `
                    <div class="flex flex-wrap justify-between items-start mb-3 gap-2">

        // 删除比赛记录（按索引）
        async function deleteMatchRecord(matchIndex) {
            if (matchIndex < 0 || matchIndex >= matchRecords.length) {
                alert('无效的记录索引！');
                return;
            }
            
            try {
                const match = matchRecords[matchIndex];
                const response = await fetch(`http://badboy.vxni.ink/api/matches.php?timestamp=${match.timestamp}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                if (data.success) {
                    // 重新加载数据
                    await loadFriendsFromAPI();
                    await loadMatchesFromAPI();
                    alert('比赛记录已删除！');
                } else {
                    alert('删除失败: ' + data.error);
                }
            } catch (error) {
                console.error('删除比赛记录失败:', error);
                alert('删除失败，请检查网络连接');
            }
        }

            }
            
            if (matchIndex < 0 || matchIndex >= sortedRecords.length) {
                alert('无效的记录索引！');
                return;
            }
            
            const record = sortedRecords[matchIndex];
            const modal = document.getElementById('matchEditModal');
            const playersContainer = document.getElementById('matchEditPlayers');
            
            // 清空容器
            playersContainer.innerHTML = '';
            
            // 填充玩家数据
            record.players.forEach((player, playerIndex) => {
                const playerItem = document.createElement('div');
                playerItem.className = 'flex items-center gap-3 mb-3';
                playerItem.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-billiard-light/10 flex items-center justify-center text-billiard-light font-bold">
                        ${player.name.charAt(0)}
                    </div>
                    <input type="text" value="${player.name}" disabled class="flex-1 px-3 py-2 border border-gray-700 rounded-lg bg-billiard-gray text-billiard-text text-sm">
                    <input type="number" value="${player.score}" min="0" step="1" class="w-16 px-3 py-2 border border-gray-700 rounded-lg bg-billiard-gray text-billiard-text match-score-input" data-player-index="${playerIndex}">
                `;
                playersContainer.appendChild(playerItem);
            });
            
            // 找到原始数组中的索引
            const originalIndex = matchRecords.findIndex(r => r.timestamp === record.timestamp);
            // 存储当前编辑的记录索引
            document.getElementById('matchEditIndex').value = originalIndex;
            
            // 显示弹窗
            modal.style.display = 'flex';
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        // 关闭比赛记录编辑弹窗
        function closeMatchEditModal() {
            const modal = document.getElementById('matchEditModal');
            modal.style.display = 'none';
            modal.classList.add('hidden');
            document.body.style.overflow = '';
        }

        // 保存比赛记录编辑
        function saveMatchEditData() {
            const matchIndex = parseInt(document.getElementById('matchEditIndex').value);
            if (matchIndex < 0 || matchIndex >= matchRecords.length) {
                alert('无效的记录索引！');
                return;
            }
            
            const record = matchRecords[matchIndex];
            const scoreInputs = document.querySelectorAll('.match-score-input');
            
            scoreInputs.forEach(input => {
                const playerIndex = parseInt(input.getAttribute('data-player-index'));
                if (playerIndex >= 0 && playerIndex < record.players.length) {
                    record.players[playerIndex].score = parseInt(input.value) || 0;
                }
            });
            
            localStorage.setItem('billiardMatches', JSON.stringify(matchRecords));
            recalculateFriendStats();
            saveFriendsToLocal();
            updateMatchRecords();
            closeMatchEditModal();
            
            alert('比赛记录已更新！');
        }

        // 绑定比赛记录编辑弹窗按钮事件
        document.getElementById('closeMatchEditBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            closeMatchEditModal();
        });
        document.getElementById('cancelMatchEditBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            closeMatchEditModal();
        });
        document.getElementById('saveMatchEditBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            saveMatchEditData();
        });

        // 点击比赛记录编辑弹窗背景关闭弹窗
        document.getElementById('matchEditModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('matchEditModal')) {
                closeMatchEditModal();
            }
        });

        // 单对单胜率分析功能
        function calculateHeadToHead() {
            const player1Name = document.getElementById('player1Select').value;
            const player2Name = document.getElementById('player2Select').value;
            
            if (!player1Name || !player2Name) {
                alert('请选择两位球友！');
                return;
            }
            
            if (player1Name === player2Name) {
                alert('请选择不同的球友！');
                return;
            }
            
            let player1Wins = 0;
            let player2Wins = 0;
            let totalGames = 0;
            
            console.log('开始计算单对单胜率:', player1Name, 'vs', player2Name);
            console.log('当前matchRecords:', matchRecords);
            console.log('比赛记录数量:', matchRecords.length);
            
            // 遍历所有比赛记录，查找两位球友都参与的比赛
            matchRecords.forEach((record, index) => {
                console.log('检查比赛记录 #' + (index + 1), record);
                
                const player1Index = record.players.findIndex(p => p.name === player1Name);
                const player2Index = record.players.findIndex(p => p.name === player2Name);
                
                console.log('player1Index:', player1Index, 'player2Index:', player2Index);
                
                // 只有当两位球友都参与了这场比赛时才计算
                if (player1Index !== -1 && player2Index !== -1) {
                    const player1Score = parseInt(record.players[player1Index].score);
                    const player2Score = parseInt(record.players[player2Index].score);
                    
                    console.log('找到共同参与的比赛 #' + (index + 1), ':', player1Name, player1Score, 'vs', player2Name, player2Score);
                    
                    // 按照单局胜负计算，得分就是胜局数
                    player1Wins += player1Score;
                    player2Wins += player2Score;
                    totalGames += player1Score + player2Score;
                    
                    console.log('本局计算:', player1Name, '胜', player1Score, '局，', player2Name, '胜', player2Score, '局');
                }
            });
            
            console.log('计算结果:', player1Name, '胜', player1Wins, '局，', player2Name, '胜', player2Wins, '局，总局数', totalGames, '局');
            
            // 计算胜率
            const player1WinRate = totalGames > 0 ? (player1Wins / totalGames * 100).toFixed(1) : 0;
            const player2WinRate = totalGames > 0 ? (player2Wins / totalGames * 100).toFixed(1) : 0;
            
            console.log('胜率:', player1Name, player1WinRate, '%，', player2Name, player2WinRate, '%');
            
            // 显示结果
            document.getElementById('headToHeadTitle').textContent = `${player1Name} vs ${player2Name} 单对单胜率`;
            document.getElementById('player1Name').textContent = player1Name;
            document.getElementById('player2Name').textContent = player2Name;
            document.getElementById('player1Wins').textContent = player1Wins;
            document.getElementById('player2Wins').textContent = player2Wins;
            document.getElementById('totalMatches').textContent = totalGames;
            document.getElementById('player1WinRate').textContent = `${player1Name} 胜率: ${player1WinRate}%`;
            document.getElementById('player2WinRate').textContent = `${player2Name} 胜率: ${player2WinRate}%`;
            
            // 更新进度条
            const player1WinRateBar = document.getElementById('player1WinRateBar');
            player1WinRateBar.style.width = `${player1WinRate}%`;
            
            // 显示结果区域
            document.getElementById('headToHeadResult').classList.remove('hidden');
        }

        // 绑定单对单胜率分析按钮事件
        document.getElementById('calculateHeadToHeadBtn').addEventListener('click', calculateHeadToHead);

        // 创建背景粒子效果
        function createParticles() {
            const particleBg = document.createElement('div');
            particleBg.className = 'particle-bg';
            document.body.appendChild(particleBg);
            
            // 创建20个粒子
            for (let i = 0; i < 20; i++) {
                createParticle(particleBg);
            }
            
            // 每3秒创建一个新粒子
            setInterval(() => {
                createParticle(particleBg);
            }, 3000);
        }
        
        function createParticle(container) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            // 随机位置
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.animationDuration = (Math.random() * 5 + 8) + 's';
            
            container.appendChild(particle);
            
            // 粒子动画结束后移除
            particle.addEventListener('animationend', () => {
                particle.remove();
            });
        }

        // 更新实时时间显示
        function updateDateTime() {
            const now = new Date();
            const options = {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
                timeZone: 'Asia/Shanghai'
            };
            const dateTimeString = now.toLocaleString('zh-CN', options);
            document.getElementById('currentDateTime').textContent = dateTimeString;
        }

        // ========== 页面初始化 ==========  
        window.addEventListener('load', async () => {
            console.log('Page loaded, initializing...');
            
            // 清除本地存储数据，测试是否是数据问题
            // localStorage.removeItem('billiardFriends');
            // localStorage.removeItem('billiardMatches');
            
            await getNetworkTime();
            recalculateFriendStats();
            updateFriendSelect();
            updateFriendCheckboxes();
            // 更新单对单胜率分析的球友选择下拉框
            updateHeadToHeadSelects();
            updateStartBtnStatus();
            updateAllRankLists();
            updateMatchRecords();
            
            // 初始化并开始实时时间更新
            updateDateTime();
            setInterval(updateDateTime, 1000);
            
            // 创建背景粒子效果
            createParticles();
            
            console.log('Initialization complete');
            
            setInterval(updateStartBtnStatus, 200);
        });
    </script>
</body>
</html>
